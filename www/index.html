<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go Master</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Title Screen -->
  <div id="screen-title" class="screen">
    <div class="screen-inner">
      <div class="title-kanji">囲碁</div>
      <h1 class="title-main">Go Master</h1>
      <nav class="menu">
        <button class="menu-btn muted" disabled>New Story Game</button>
        <button class="menu-btn" id="btn-local-game">New Local Game</button>
        <button class="menu-btn muted" disabled>Options</button>
      </nav>
    </div>
  </div>

  <!-- Local Game Setup -->
  <div id="screen-local-setup" class="screen hidden">
    <div class="screen-inner">
      <h2 class="screen-heading">Local Game</h2>
      <nav class="menu">
        <button class="menu-btn" id="btn-pvai">Player vs AI</button>
        <button class="menu-btn" id="btn-pvp">Player vs Player</button>
        <button class="menu-btn back-btn" id="btn-back-local">← Back</button>
      </nav>
    </div>
  </div>

  <!-- AI Difficulty -->
  <div id="screen-ai-difficulty" class="screen hidden">
    <div class="screen-inner">
      <h2 class="screen-heading">AI Difficulty</h2>
      <nav class="menu">
        <button class="menu-btn two-line" data-diff="0">
          <span class="opt-label">Noob</span>
          <span class="opt-desc">Plays randomly</span>
        </button>
        <button class="menu-btn two-line" data-diff="1">
          <span class="opt-label">Average</span>
          <span class="opt-desc">Captures &amp; defends</span>
        </button>
        <button class="menu-btn two-line" data-diff="2">
          <span class="opt-label">Dan</span>
          <span class="opt-desc">Searches ahead (MCTS)</span>
        </button>
        <button class="menu-btn back-btn" id="btn-back-diff">← Back</button>
      </nav>
    </div>
  </div>

  <!-- Board Size -->
  <div id="screen-board-size" class="screen hidden">
    <div class="screen-inner">
      <h2 class="screen-heading">Board Size</h2>
      <nav class="menu">
        <button class="menu-btn two-line" data-size="9">
          <span class="opt-label">9 × 9</span>
          <span class="opt-desc">Quick game</span>
        </button>
        <button class="menu-btn two-line" data-size="13">
          <span class="opt-label">13 × 13</span>
          <span class="opt-desc">Medium game</span>
        </button>
        <button class="menu-btn two-line" data-size="19">
          <span class="opt-label">19 × 19</span>
          <span class="opt-desc">Full game</span>
        </button>
        <button class="menu-btn back-btn" id="btn-back-size">← Back</button>
      </nav>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="screen-game" class="screen hidden">
    <div id="game-layout">
      <div id="game-topbar">
        <button class="small-btn" id="btn-menu">← Menu</button>
        <span id="turn-text">Black’s Turn</span>
        <button class="small-btn" id="pass-btn">Pass</button>
      </div>

      <div id="captures-bar">
        <div class="cap-info">
          <span class="stone-icon black"></span>
          <span class="cap-dots" id="black-cap-dots"></span>
          <span class="cap-count" id="black-captures">0</span>
        </div>
        <div id="ai-status"></div>
        <div class="cap-info reverse">
          <span class="cap-count" id="white-captures">0</span>
          <span class="cap-dots" id="white-cap-dots"></span>
          <span class="stone-icon white"></span>
        </div>
      </div>

      <!-- Board flanked by avatars: player (left) and Sensei (right). -->
      <div id="board-row">
        <!-- Player avatar — humanoid silhouette placeholder (left side). -->
        <div id="player-avatar-wrap" class="side-avatar">
          <div class="humanoid"></div>
          <div class="side-name">You</div>
        </div>

        <canvas id="board-canvas"></canvas>

        <!-- Sensei avatar (AI games only). The .thinking class animates it. -->
        <div id="ai-avatar-wrap" class="side-avatar hidden">
          <div id="ai-avatar">
            <div class="bust">
              <div class="head">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="brow left"></div>
                <div class="brow right"></div>
              </div>
            </div>
            <div class="thought"><span></span><span></span><span></span></div>
          </div>
          <div id="avatar-name"></div>
        </div>
      </div>

      <!-- Scoreboard sits inline (board stays visible) so players can verify. -->
      <div id="game-over-panel" class="hidden">
        <h2>Game Over</h2>
        <table id="score-table">
          <thead>
            <tr><th></th><th>Terr.</th><th>Pris.</th><th>Komi</th><th>Total</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="stone-icon black"></span></td>
              <td id="sc-black-terr">0</td>
              <td id="sc-black-pris">0</td>
              <td>—</td>
              <td id="sc-black-total">0</td>
            </tr>
            <tr>
              <td><span class="stone-icon white"></span></td>
              <td id="sc-white-terr">0</td>
              <td id="sc-white-pris">0</td>
              <td id="sc-white-komi">6.5</td>
              <td id="sc-white-total">6.5</td>
            </tr>
          </tbody>
        </table>
        <p id="result-text">Both players passed.</p>
        <p id="score-note">Japanese rules: territory + prisoners. Capture any
          dead stones before passing so they count.</p>
        <button class="menu-btn" id="new-game-btn">← Main Menu</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
